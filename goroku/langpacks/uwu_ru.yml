  choose_installation: <tg-emoji emoji-id="5413752980358856512">☀️</tg-emoji> <b>Выбевите вавиант установки Goroku:</b>
  vds_install: '<tg-emoji emoji-id="5413584527446541529">💐</tg-emoji> Пвоцесс установки на VDS выповняется одной к-командой <tg-emoji emoji-id="5413816404140920179">🤓</tg-emoji>:

    <pre><code class="language-shell">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>

    <i>Пвимечание: Есви у вас о-отсутствуют пвава sudo, исквючите соответствующую часть командя <tg-emoji emoji-id="5413816404140920179">🤓</tg-emoji>-команди <tg-emoji emoji-id="5413816404140920179">🤓</tg-emoji>.</i>'
  wsl_install: "<b>Скачай WSL.</b> Двя этого отквой PowerShell с пвавами главного пупсика-администратора <tg-emoji emoji-id=\"5413431579366162478\">\U0001F454</tg-emoji> и напиши <code>wsl --install -d Ubuntu-22.04</code> \n<tg-emoji emoji-id=\"5413820660453509128\">\U0001F928</tg-emoji> <i>Двя установки WSL н-необходима Windows 10 build 2004 иви Windows 11 вюбой в-вевсии <tg-emoji emoji-id=\"5413816404140920179\">\U0001F913</tg-emoji> и ПК с поддевжкой в-вивтуавизации. Двя установки на бовее ванние в-вевсии <tg-emoji emoji-id=\"5413816404140920179\">\U0001F913</tg-emoji> ОС о-обватись к</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">этой стванице</a>\n\n⬜️ <b>Певезагвузи ПК и запусти пвивожение Ubuntu 22.04.x</b> \n\n⬜️ <b>Вставь в него командю <tg-emoji emoji-id=\"5413816404140920179\">\U0001F913</tg-emoji>-командю <tg-emoji emoji-id=\"5413816404140920179\">\U0001F913</tg-emoji> (ПКМ):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code>\
    \ \n<tg-emoji emoji-id=\"5413820660453509128\">\U0001F928</tg-emoji> <i>Пви появвении жевтых п-пведупвеждений введи</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>заменив /home/username/.local/bin на тот п-путь, о котовом гововится в сообщении <tg-emoji emoji-id=\"5413708115130483633\">\U0001FAF6</tg-emoji></i>\n\n⬜️ <b>Вставь командю <tg-emoji emoji-id=\"5413816404140920179\">\U0001F913</tg-emoji>-командю <tg-emoji emoji-id=\"5413816404140920179\">\U0001F913</tg-emoji> (ПКМ):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<tg-emoji emoji-id=\"5413708115130483633\">\U0001FAF6</tg-emoji> <b>Где повучить API_ID и API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Видео</a>"
  userland_install: '<b>Установи UserLAnd по</b> <a href="https://play.google.com/store/apps/details?id=tech.ula">с-ссывке</a>


    <b>Отквой его, выбеви Ubuntu —&gt; Minimal —&gt; Terminal</b>


    <b>Жди установки диствибутива, можешь навить чаю</b>


    <b>Посве успешной <tg-emoji emoji-id="5411228694935012881">👍</tg-emoji> установки певед тобой отквоется тевминав, пиши туда:</b>

    <pre><code class="language-bash">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>


    <b>В к-конце установки п-появится ссывка, певеходи по ней и вводи данные своего а-аккаунта <tg-emoji emoji-id="5411385529960791742">😎</tg-emoji> двя входа.


    В-вуавя пасхалочка уву! Вы установиви Goroku на UserLAnd.</b>'
